spring.application.name=CustomerTransaction
server.port=8081

# Tell Springboot to always intialize the database with your scripts
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:customerTransaction-table.sql
spring.sql.init.data-locations=classpath:customerTransaction-data.sql

# Enable the H2 Console
spring.h2.console.enabled=true

# Database Connection Settings
spring.datasource.url=jdbc:h2:mem:customerTransactionDB
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=raushan
spring.datasource.password=pds4567@

# Show SQL queries in the console (helpful for debugging)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format-sql=true
spring.jpa.hibernate.ddl-auto=none

# Ignoring Extra Fields Coming in JSON payloads
spring.jackson.deserialization.fail-on-unknown-properties=true
